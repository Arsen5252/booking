{% extends 'base.html' %}

{% block content %}
    
<h1>Бронювання</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card">
        <img src="{{ apartment.image.url }}" class="img-fluid" alt="{{ apartment.title }}">
        </div>
    </div>
    <div class="col-md-6">
        <h2>{{ apartment.title }}</h2>
        <p>{{ apartment.description }}</p>
        <p><strong>Локація:</strong> {{ apartment.location }}</p>
        <p><strong>Ціна за ніч:</strong> {{ apartment.price }} грн</p>
        <a href="#" class="btn btn-primary">Забронювати</a>
    </div>
</div>
        <form action="" method="post">
            {% csrf_token %}
            <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Дата заїзду</label>
    <input name="check_in" type="datetime-local" class="form-control" id="inputEmail4">
  </div>
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Дата виїзду</label>
    <input name="check_out" type="datetime-local" class="form-control" id="inputPassword4">
  </div>
            <div class="row">
  <div class="col">
    <input name="name" type="text" required class="form-control" placeholder="Введіть ім'я" aria-label="First name">
  </div>
  <div class="col">
    <input name="surname" type="text" required class="form-control" placeholder="Введіть прізвище" aria-label="Last name">
  </div>
</div>
<div class="row">
  <div class="col">
    <input name="phone" type="tel" required class="form-control" placeholder="Введіть телефон" aria-label="First name">
  </div>
  <div class="col">
    <input name="email" type="email" required class="form-control" placeholder="Введіть email" aria-label="Last name">
  </div>
</div>

<button type="submit" class="btn btn-primary mt-3">Підтвердити бронювання</button>
        


{% endblock %}
